<html lang="en"><head><meta charset="utf-8"><meta content="width=393, height=852, initial-scale=1.0" name="viewport"><title>educational_insight</title><script src="https://cdn.tailwindcss.com"></script><script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script><style>        :root {            --color-primary: #2563EB;            --color-surface: #FFFFFF;            --color-border: #E5E7EB;            --color-text-main: #0F172A;            --color-text-muted: #64748B;            --color-bg: #F8FAFC;        }        .iphone-frame {            width: 393px;            height: 852px;            background-color: #ffffff;            position: relative;            border-radius: 0px;            box-shadow: 0 0 20px rgba(0,0,0,0.1);            overflow: hidden;            margin: 2rem auto;        }        .custom-shadow {            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);        }    </style></head><body class="bg-gray-100"><div class="iphone-frame flex flex-col bg-[var(--color-bg)]"><!-- #header-nav_020 --><div class="px-6 pt-12 pb-6 flex items-center justify-between relative z-10"><button class="w-10 h-10 flex items-center justify-center border border-[var(--color-border)] rounded-xl bg-white active:scale-90" data-navigates-to="interest_selection_quiz.html" style="; cursor: pointer;"><iconify-icon class="text-[var(--color-text-main)] text-xl" icon="lucide:chevron-left"></iconify-icon></button><div class="flex-1 mx-8"><div class="h-1.5 w-full bg-gray-200 rounded-full overflow-hidden"><div class="h-full bg-[var(--color-primary)] w-[50%]"></div></div></div><span class="text-[13px] font-semibold text-[var(--color-text-muted)] w-10 text-right">3/6</span></div><!-- /#header-nav_020 --><!-- #insight-content_021 --><div class="flex-1 flex flex-col items-center px-8 text-center"><div class="mt-12 mb-10 w-full"><!-- Generation-Info: {"aspectRatio": "1:1", "background": "transparent"} --><img alt="Minimalist High-End Photography, An elegant clean abstract 3D visualization of data growth and progress markers on a plain white background" class="w-64 h-64 mx-auto object-contain" src="https://media.screensdesign.com/gasset/c72a0da2-2b43-4cfd-b791-cbc6bd6d1718.png"></div><!-- #did-you-know_022 --><div class="inline-block px-4 py-1.5 bg-blue-100 text-[var(--color-primary)] rounded-full text-[13px] font-bold tracking-wide uppercase mb-6">                Did you know?            </div><h2 class="text-[30px] font-bold text-[var(--color-text-main)] leading-tight mb-4">                Structured learning increases retention by 40%.            </h2><p class="text-[17px] text-[var(--color-text-muted)] leading-relaxed">                Students who follow a guided curriculum are twice as likely to finish their courses and apply their new skills effectively.            </p><!-- /#did-you-know_022 --></div><!-- /#insight-content_021 --><!-- #fixed-footer_023 --><div class="p-8 bg-[var(--color-bg)]"><button class="w-full bg-[var(--color-primary)] text-white font-semibold py-4 rounded-2xl active:scale-[0.98] transition-all custom-shadow" data-navigates-to="social_proof_testimonials.html" style="; cursor: pointer;">                Continue journey            </button></div><!-- /#fixed-footer_023 --></div>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // Collect all navigable elements with their targets
        const hotspots = [];
        document.querySelectorAll('[data-navigates-to]').forEach(el => {
          hotspots.push({
            element: el,
            target: el.getAttribute('data-navigates-to'),
            isScreenTap: el.getAttribute('data-screen-tap') === 'true'
          });
        });

        // Document-level capture phase click handler
        // Checks click position against element bounds - works regardless of z-index stacking
        document.addEventListener('click', (e) => {
          const clickX = e.clientX;
          const clickY = e.clientY;

          // First check screen-tap (tap anywhere) connections
          const screenTapHotspot = hotspots.find(h => h.isScreenTap);
          if (screenTapHotspot && screenTapHotspot.target) {
            e.preventDefault();
            e.stopPropagation();
            window.location.href = screenTapHotspot.target;
            return;
          }

          // Check each hotspot element's bounds
          for (const hotspot of hotspots) {
            if (hotspot.isScreenTap) continue; // Already handled above
            try {
              const rect = hotspot.element.getBoundingClientRect();
              if (clickX >= rect.left && clickX <= rect.right &&
                  clickY >= rect.top && clickY <= rect.bottom) {
                e.preventDefault();
                e.stopPropagation();
                if (hotspot.target) window.location.href = hotspot.target;
                return;
              }
            } catch (err) {
              // Element might have issues, skip it
            }
          }

          // Prevent default for non-connected interactive elements
          const clickedInteractive = e.target.closest('a, button, [onclick]');
          if (clickedInteractive) {
            e.preventDefault();
            e.stopPropagation();
          }
        }, true); // capture phase

        // Prevent form submissions
        document.addEventListener('submit', (e) => {
          e.preventDefault();
          e.stopPropagation();
        }, true);
      });
    </script></body></html>
