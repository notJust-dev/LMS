<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta content="width=393, height=852, initial-scale=1.0" name="viewport"><title>interest_selection_quiz</title><script src="https://cdn.tailwindcss.com"></script><script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script><style>        :root {            --color-primary: #2563EB;            --color-surface: #FFFFFF;            --color-border: #E5E7EB;            --color-text-main: #0F172A;            --color-text-muted: #64748B;            --color-bg: #FFFFFF;        }        .iphone-frame {            width: 393px;            height: 852px;            background-color: #ffffff;            position: relative;            border-radius: 0px;            box-shadow: 0 0 20px rgba(0,0,0,0.1);            overflow: hidden;            margin: 2rem auto;        }        .custom-shadow {            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);        }    </style></head><body class="bg-gray-100"><div class="iphone-frame flex flex-col bg-[var(--color-bg)]"><!-- #header-nav_010 --><div class="px-6 pt-12 pb-6 flex items-center justify-between"><button class="w-10 h-10 flex items-center justify-center border border-[var(--color-border)] rounded-xl active:scale-90" data-navigates-to="goal_selection_quiz.html" style="; cursor: pointer;"><iconify-icon class="text-[var(--color-text-main)] text-xl" icon="lucide:chevron-left"></iconify-icon></button><div class="flex-1 mx-8"><div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-[var(--color-primary)] w-[33.3%]"></div></div></div><span class="text-[13px] font-semibold text-[var(--color-text-muted)] w-10 text-right">2/6</span></div><!-- /#header-nav_010 --><!-- #quiz-content_011 --><div class="flex-1 overflow-y-auto px-6"><div class="mb-8 mt-4"><h2 class="text-[28px] font-bold text-[var(--color-text-main)] leading-tight mb-3">Choose your interests</h2><p class="text-[16px] text-[var(--color-text-muted)]">Pick at least 3 topics to help us personalize your learning path.</p></div><!-- #interests-grid_012 --><div class="grid grid-cols-2 gap-3 pb-6"><!-- #interest-card-design_013 --><div class="p-4 border-2 border-[var(--color-primary)] bg-blue-50 rounded-2xl flex flex-col gap-3 active:scale-95 transition-transform"><iconify-icon class="text-2xl text-[var(--color-primary)]" icon="lucide:pen-tool"></iconify-icon><span class="font-semibold text-[var(--color-text-main)]">UI/UX Design</span></div><!-- /#interest-card-design_013 --><!-- #interest-card-coding_014 --><div class="p-4 border border-[var(--color-border)] rounded-2xl flex flex-col gap-3 active:scale-95 transition-transform"><iconify-icon class="text-2xl text-[var(--color-text-muted)]" icon="lucide:code"></iconify-icon><span class="font-semibold text-[var(--color-text-main)]">Development</span></div><!-- /#interest-card-coding_014 --><!-- #interest-card-marketing_015 --><div class="p-4 border border-[var(--color-border)] rounded-2xl flex flex-col gap-3 active:scale-95 transition-transform"><iconify-icon class="text-2xl text-[var(--color-text-muted)]" icon="lucide:megaphone"></iconify-icon><span class="font-semibold text-[var(--color-text-main)]">Marketing</span></div><!-- /#interest-card-marketing_015 --><!-- #interest-card-business_016 --><div class="p-4 border-2 border-[var(--color-primary)] bg-blue-50 rounded-2xl flex flex-col gap-3 active:scale-95 transition-transform"><iconify-icon class="text-2xl text-[var(--color-primary)]" icon="lucide:trending-up"></iconify-icon><span class="font-semibold text-[var(--color-text-main)]">Business</span></div><!-- /#interest-card-business_016 --><!-- #interest-card-data_017 --><div class="p-4 border border-[var(--color-border)] rounded-2xl flex flex-col gap-3 active:scale-95 transition-transform"><iconify-icon class="text-2xl text-[var(--color-text-muted)]" icon="lucide:database"></iconify-icon><span class="font-semibold text-[var(--color-text-main)]">Data Science</span></div><!-- /#interest-card-data_017 --><!-- #interest-card-photo_018 --><div class="p-4 border-2 border-[var(--color-primary)] bg-blue-50 rounded-2xl flex flex-col gap-3 active:scale-95 transition-transform"><iconify-icon class="text-2xl text-[var(--color-primary)]" icon="lucide:camera"></iconify-icon><span class="font-semibold text-[var(--color-text-main)]">Photography</span></div><!-- /#interest-card-photo_018 --></div><!-- /#interests-grid_012 --></div><!-- /#quiz-content_011 --><!-- #fixed-footer_019 --><div class="p-8 bg-white border-t border-[var(--color-border)]"><button class="w-full bg-[var(--color-primary)] text-white font-semibold py-4 rounded-2xl active:scale-[0.98] transition-all custom-shadow" data-navigates-to="educational_insight.html" style="; cursor: pointer;">                Continue            </button></div><!-- /#fixed-footer_019 --></div>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // Collect all navigable elements with their targets
        const hotspots = [];
        document.querySelectorAll('[data-navigates-to]').forEach(el => {
          hotspots.push({
            element: el,
            target: el.getAttribute('data-navigates-to'),
            isScreenTap: el.getAttribute('data-screen-tap') === 'true'
          });
        });

        // Document-level capture phase click handler
        // Checks click position against element bounds - works regardless of z-index stacking
        document.addEventListener('click', (e) => {
          const clickX = e.clientX;
          const clickY = e.clientY;

          // First check screen-tap (tap anywhere) connections
          const screenTapHotspot = hotspots.find(h => h.isScreenTap);
          if (screenTapHotspot && screenTapHotspot.target) {
            e.preventDefault();
            e.stopPropagation();
            window.location.href = screenTapHotspot.target;
            return;
          }

          // Check each hotspot element's bounds
          for (const hotspot of hotspots) {
            if (hotspot.isScreenTap) continue; // Already handled above
            try {
              const rect = hotspot.element.getBoundingClientRect();
              if (clickX >= rect.left && clickX <= rect.right &&
                  clickY >= rect.top && clickY <= rect.bottom) {
                e.preventDefault();
                e.stopPropagation();
                if (hotspot.target) window.location.href = hotspot.target;
                return;
              }
            } catch (err) {
              // Element might have issues, skip it
            }
          }

          // Prevent default for non-connected interactive elements
          const clickedInteractive = e.target.closest('a, button, [onclick]');
          if (clickedInteractive) {
            e.preventDefault();
            e.stopPropagation();
          }
        }, true); // capture phase

        // Prevent form submissions
        document.addEventListener('submit', (e) => {
          e.preventDefault();
          e.stopPropagation();
        }, true);
      });
    </script></body></html>
